name: DevSecOps Infrastructure Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Выделяем права для работы с GitHub Packages (Складом образов)
permissions:
  contents: read
  packages: write

jobs:
  security_audit:
    name: Security & Compliance Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Checkov Reviewer
        uses: bridgecrewio/checkov-action@master
        with:
          directory: helm-chart/secure-app
          framework: kubernetes
          compact: true
          quiet: true
          skip_check: CKV_K8S_15,CKV_K8S_35,CKV_K8S_43,CKV_K8S_14

  # ... (всё, что выше, до job 'build_and_push', остается без изменений) ...

  build_and_push:
    name: Build & Publish Container Images
    runs-on: ubuntu-latest
    needs: security_audit # Сборка начнется ТОЛЬКО если аудит безопасности прошел успешно
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # 1. НОВЫЙ ШАГ: Генерируем короткий хэш коммита
      - name: Generate Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Автоматический внутренний токен GitHub

      # Сборка и отправка Фронтенда (Теперь с динамическим тегом!)
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Используем короткий SHA, сгенерированный ранее
          tags: ghcr.io/${{ github.repository }}/my-secure-frontend:${{ steps.vars.outputs.sha_short }}

      # Сборка и отправка Бэкенда (Теперь с динамическим тегом!)
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          # Используем короткий SHA, сгенерированный ранее
          tags: ghcr.io/${{ github.repository }}/my-secure-backend:${{ steps.vars.outputs.sha_short }}