name: DevSecOps Infrastructure Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Выделяем права для работы с GitHub Packages (Складом образов)
permissions:
  contents: read
  packages: write

jobs:
  security_audit:
    name: Security & Compliance Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Checkov Reviewer
        uses: bridgecrewio/checkov-action@master
        with:
          directory: helm-chart/secure-app
          framework: kubernetes
          compact: true
          quiet: true
          skip_check: CKV_K8S_15,CKV_K8S_35,CKV_K8S_43,CKV_K8S_14

  build_scan_and_push:
    name: Build, Scan & Publish Container Images
    runs-on: ubuntu-latest
    needs: security_audit # Сборка начнется ТОЛЬКО если аудит безопасности прошел успешно
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Generate Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # Автоматический внутренний токен GitHub

      # --- FRONTEND: Сборка, Сканирование, Отправка ---
      - name: Build Frontend (Local Load)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true # ИЗМЕНЕНИЕ: Сохраняем в памяти раннера, не отправляем!
          tags: ghcr.io/${{ github.repository }}/my-secure-frontend:${{ steps.vars.outputs.sha_short }}

      - name: Run Trivy on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/my-secure-frontend:${{ steps.vars.outputs.sha_short }}
          format: 'table'
          exit-code: '1' # ИЗМЕНЕНИЕ: Фейлим пайплайн при наличии CRITICAL/HIGH уязвимостей
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Frontend to Registry
        run: docker push ghcr.io/${{ github.repository }}/my-secure-frontend:${{ steps.vars.outputs.sha_short }}


      # --- BACKEND: Сборка, Сканирование, Отправка ---
      - name: Build Backend (Local Load)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          load: true # ИЗМЕНЕНИЕ: Сохраняем в памяти раннера
          tags: ghcr.io/${{ github.repository }}/my-secure-backend:${{ steps.vars.outputs.sha_short }}

      - name: Run Trivy on Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/my-secure-backend:${{ steps.vars.outputs.sha_short }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Backend to Registry
        run: docker push ghcr.io/${{ github.repository }}/my-secure-backend:${{ steps.vars.outputs.sha_short }}