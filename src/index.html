<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Trading Terminal</title>
    <style>
        body {
            background-color: #0b0e14; color: #00ff9d;
            font-family: 'Courier New', Courier, monospace;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; height: 100vh; margin: 0;
        }
        .container {
            border: 1px solid #00ff9d; padding: 40px; border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 157, 0.2);
            text-align: center; max-width: 600px;
        }
        h1 { margin-bottom: 10px; letter-spacing: 2px; }
        .status {
            display: inline-block; padding: 5px 15px; margin-top: 20px;
            background-color: rgba(0, 255, 157, 0.1); border: 1px solid #00ff9d; border-radius: 20px;
        }
        .mock-button {
            margin-top: 30px; padding: 10px 20px; background-color: #00ff9d; color: #0b0e14;
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>[ SECURE TERMINAL ]</h1>
        <p>Zero-Trust Kubernetes Infrastructure Active</p>
        <div class="status">● System Status: Fully Operational</div>
        <br>
        <button class="mock-button" onclick="alert('Backend module (Redis+Python) will be connected soon!')">
            Connect Margin Backend
        </button>
    </div>
</body>
</html>
