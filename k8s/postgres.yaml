# 1. Сервис для доступа к БД
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: secure-prod
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
# 2. Сам сервер БД
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: secure-db
  namespace: secure-prod
  annotations:
    checkov.io/skip1: CKV_K8S_22=Базе данных критически необходим доступ на запись
    checkov.io/skip2: CKV_K8S_40=Официальный образ использует UID 70, а не >10000
    checkov.io/skip3: CKV_K8S_23=Init-контейнеру нужен root для смены прав на диск
    checkov.io/skip4: CKV_K8S_25=Init-контейнеру нужны права CHOWN для подготовки диска
spec:
  serviceName: "postgres-service"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
      
      # НОВЫЙ БЛОК: Временный контейнер для подготовки диска
      initContainers:
        - name: fix-pvc-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 70:70 /var/lib/postgresql/data"]
          securityContext:
            runAsNonRoot: false
            runAsUser: 0 # Временно берем права root
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER"] # Даем право только менять владельца файлов
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

      # ОСНОВНАЯ БАЗА ДАННЫХ
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - secretRef:
                name: postgres-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "secure_app_user", "-d", "secure_app_db"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "secure_app_user", "-d", "secure_app_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-data-pvc