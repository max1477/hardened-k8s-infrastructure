# 1. Сервис для доступа к БД
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: secure-prod
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
# 2. Сам сервер БД
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: secure-db
  namespace: secure-prod
  annotations:
    # Аннотации перенесены на самый верхний уровень StatefulSet!
    checkov.io/skip1: CKV_K8S_22=Базе данных критически необходим доступ на запись
    checkov.io/skip2: CKV_K8S_40=Официальный образ использует UID 70, а не >10000
spec:
  serviceName: "postgres-service"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      automountServiceAccountToken: false
      # 1. БАЗОВАЯ ЗАЩИТА (Pod Level): Запрещаем root-доступ
      securityContext:
        runAsNonRoot: true
        runAsUser: 70       # Стандартный UID пользователя postgres в Alpine
        runAsGroup: 70
        fsGroup: 70         # Автоматическая выдача прав на примонтированный жесткий диск
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          # 2. ЖЕСТКАЯ ЗАЩИТА (Container Level): Отбираем все системные привилегии Linux
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          envFrom:
            - secretRef:
                name: postgres-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "secure_app_user"]
            initialDelaySeconds: 15
            periodSeconds: 10
          # 3. ИСПРАВЛЕНИЕ: Добавлена обязательная проверка Readiness
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "secure_app_user"]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-data-pvc